name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release:
        description: Release type
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
          - next
          - conventional
          - pre-patch
          - pre-minor
          - pre-major
          - as-is
          - custom
      custom_version:
        description: Exact version to release when release=custom
        required: false
        type: string

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Ensure the workflow runs on main
        if: github.ref_name != 'main'
        run: |
          echo "This workflow must be run from the main branch." >&2
          exit 1

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve bumpp release argument
        id: release
        env:
          INPUT_RELEASE: ${{ inputs.release }}
          INPUT_CUSTOM_VERSION: ${{ inputs.custom_version }}
        run: |
          current_version=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")

          case "$INPUT_RELEASE" in
            pre-patch)
              bumpp_release="prepatch"
              ;;
            pre-minor)
              bumpp_release="preminor"
              ;;
            pre-major)
              bumpp_release="premajor"
              ;;
            as-is)
              bumpp_release="$current_version"
              ;;
            custom)
              if [ -z "$INPUT_CUSTOM_VERSION" ]; then
                echo "custom_version is required when release=custom." >&2
                exit 1
              fi
              bumpp_release="$INPUT_CUSTOM_VERSION"
              ;;
            *)
              bumpp_release="$INPUT_RELEASE"
              ;;
          esac

          echo "current=$current_version" >> "$GITHUB_OUTPUT"
          echo "value=$bumpp_release" >> "$GITHUB_OUTPUT"

      - name: Bump version, create commit and push tag
        run: pnpm exec bumpp --release "${{ steps.release.outputs.value }}" --yes

      - name: Create GitHub release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM via OIDC
        run: pnpm publish --provenance --access=public --no-git-checks
